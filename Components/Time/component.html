<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container sw-shell is-padded">
        <div class="clock-display sw-card">
            <div class="time-row primary">
                <span id="time-hours" class="time-unit"></span>
                <span class="time-label">时</span>
            </div>
            <div class="time-row primary">
                <span id="time-minutes" class="time-unit"></span>
                <span class="time-label">分</span>
            </div>
            <div class="time-divider"></div>
            <div class="time-row secondary">
                <span id="time-seconds" class="time-unit"></span>
                <span class="time-label">秒</span>
            </div>
        </div>
    </div>
    <script src="./time.js"></script>
</body>
</html>
